# Saved views for sf_opps
# Usage: sf_opps -v <name>
# CLI flags override view settings
#
# Filters:
#   team: true                          # your team (from config)
#   quarter: this+next                  # this, next, this+next, Q32026, etc.
#   account: Volvo                      # fuzzy match
#   ae: Todd                            # fuzzy match
#   ninja: none                         # "none" = unassigned, otherwise fuzzy
#   type: New Business                  # single value
#   type: [New Business, Expansion]     # multiple values (IN query)
#   stage: "4. Closing"                 # single value (fuzzy LIKE)
#   stage: ["3. Value Proposal", "4. Closing"]  # multiple (exact IN)
#   territory: [North America]          # list of territories

# Full team pipeline
pipeline:
  team: true
  quarter: this+next
# Opps without a ninja — needs staffing
unassigned:
  quarter: this+next
  ninja: none
  territory: [North America]

# Late-stage deals this quarter — needs push
closing:
  team: true
  quarter: this
  stage: ["3. Value Proposal", "4. Closing"]

# Next quarter early stage — planning ahead
upcoming:
  team: true
  quarter: next

# New business only
newbiz:
  team: true
  quarter: this+next
  type: New Business

# Expansions only
expansions:
  team: true
  quarter: this+next
  type: Up-sell and Retention

justin_expansion:
  ninja: justin
  type: expansion

exp_radha:
  ninja: radha
  type: expansion

next_quarter_late_cycle:
  quarter: next
  type: New
  stage: [3. Value Proposal, 4. Closing]
  territory: [NA]

unassigned_new_business:
  ninja: none
  territory: [North America]
  type: New
  stage: [1. Qualified Prospect, 2. Value Scenario, 3. Value Proposal, 4. Closing]
]

working_deals:
  ninja: assigned
  quarter: [2026]
  stage: open
  territory: [NA]

portfolio:
  team: true
  quarter: [2026, 2027]
  stage: open
